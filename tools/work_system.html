<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS: 极速计划系统 V12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; transition: all 0.4s ease; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .prio-1 { border-left: 10px solid #ef4444; }
        .prio-2 { border-left: 10px solid #f97316; }
        .prio-3 { border-left: 10px solid #3b82f6; }
        .prio-4 { border-left: 10px solid #94a3b8; }

        #statusBoard {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 5vw;
        }
        #statusBoard.active { display: flex; animation: zoomIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes zoomIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }

        #boardNote { font-size: 3.5rem; font-weight: 900; line-height: 1.2; margin-bottom: 2rem; }
        #boardTimer { font-size: 15rem; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
        #boardTaskName { font-size: 2rem; opacity: 0.8; font-weight: 700; border-top: 4px solid currentColor; padding-top: 2rem; margin-top: 2rem; width: 80%; }

        @media (max-width: 768px) {
            #boardNote { font-size: 2.2rem; }
            #boardTimer { font-size: 8rem; }
            #boardTaskName { font-size: 1.5rem; }
        }

        .side-panel {
            position: fixed; top: 80px; right: 20px; width: 340px;
            max-height: 80vh; background: white; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: none; z-index: 800; flex-direction: column; overflow: hidden;
        }
        .scroll-area { overflow-y: auto; flex: 1; padding: 20px; }
        .show { display: flex !important; }

        .play-btn-ready { background: #18181b; color: white; transition: all 0.3s; }
        .play-btn-ready:hover { transform: translateY(-2px); background: #000; }

        /* 隐藏数字输入框箭头 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }


        /* 外壳：固定高度，超出隐藏 */
.swipe-container {
    position: relative;
    overflow: hidden;
    border-radius: 24px;
}

/* 底层：放图标和背景色，平时被盖住 */
.swipe-underlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 25px;
    z-index: 1; /* 在内容下面 */
}

/* 表层：放任务文字和按钮 */
.swipe-content {
    position: relative;
    z-index: 10; /* 确保盖在图标上面 */
    background: white;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

/* 滑动时关掉过渡，否则手指会有延迟感 */
.no-transition { transition: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <div id="app">
        <header id="mainHeader" class="pt-12 pb-20 px-6 rounded-b-[50px] text-white shadow-2xl transition-all duration-500">
            <div class="max-w-md mx-auto">
                <nav class="flex bg-black/20 backdrop-blur-md p-1 rounded-2xl mb-8 border border-white/10">
                    <button onclick="switchMode('focus')" id="tab-focus" class="flex-1 py-2 rounded-xl text-[10px] font-black transition-all">专注</button>
                    <button onclick="switchMode('sturdy')" id="tab-sturdy" class="flex-1 py-2 rounded-xl text-[10px] font-black transition-all">强健</button>
                    <button onclick="switchMode('buffer')" id="tab-buffer" class="flex-1 py-2 rounded-xl text-[10px] font-black transition-all">缓冲</button>
                    <button onclick="switchMode('admin')" id="tab-admin" class="flex-1 py-2 rounded-xl text-[10px] font-black transition-all">杂物</button>
                </nav>
                <div class="flex justify-between items-end">
                    <div>
                        <h1 id="modeTitle" class="text-5xl font-black italic tracking-tighter uppercase leading-none">Focus</h1>
                        <p id="modeDesc" class="text-sm opacity-90 mt-4 font-bold tracking-wide">45分钟 深度管理</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleLogs(event)" class="w-14 h-14 rounded-2xl bg-white/20 backdrop-blur-lg flex items-center justify-center text-2xl active:scale-90 transition-all shadow-inner">📜</button>
                        <button onclick="toggleSettings(event)" class="w-14 h-14 rounded-2xl bg-white/20 backdrop-blur-lg flex items-center justify-center text-2xl active:scale-90 transition-all shadow-inner">⚙️</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto px-4 -mt-10">
            <!-- 核心交互区 -->
            <div class="bg-white rounded-[32px] p-6 shadow-2xl border border-white mb-8">
                <!-- 第一行：名称 + 时间 -->
                <div class="flex gap-3 mb-4 items-center">
                    <div class="flex-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1 ml-1">任务名称</label>
                        <input type="text" id="taskInput" placeholder="想做什么？"
                            class="w-full text-lg font-black p-4 bg-slate-50 rounded-2xl outline-none focus:bg-white border-2 border-transparent focus:border-slate-200 transition-all">
                    </div>
                    <div class="w-20 text-center">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">分钟</label>
                        <input type="number" id="timeDurationInp"
                            class="w-full p-4 bg-slate-50 rounded-2xl font-black text-center text-lg text-slate-700 outline-none focus:bg-white border-2 border-transparent focus:border-slate-200 transition-all">
                    </div>
                </div>

                <!-- 第二行：优先级/能耗特定选项 -->
                <div id="modeSpecificInput" class="mb-6"></div>

                <button onclick="addTask()" id="addBtn"
                    class="w-full py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform uppercase tracking-widest">
                    添加任务
                </button>
            </div>

            <div id="taskList" class="space-y-4"></div>
        </main>
    </div>

    <!-- 全屏状态牌 -->
    <div id="statusBoard">
        <div id="boardNote">告示留言加载中</div>
        <div id="boardTimer" class="mono tracking-tighter">45:00</div>
        <div id="boardTaskName">正在执行的任务</div>
        <!-- 按钮容器：补全了 onclick 功能 -->
        <div class="flex w-full justify-between items-stretch gap-3 px-5 mt-10 box-border max-w-lg">

            <!-- 左侧：暂告段落 (点击执行 stopTimer(false)) -->
            <button onclick="stopTimer(false)" class="flex-1 flex items-center justify-center border-2 border-white rounded-2xl py-4 min-h-[140px] active:scale-95 transition-transform bg-transparent">
                <span style="writing-mode: vertical-rl; letter-spacing: 4px;" class="font-black text-white">暂告段落</span>
            </button>

            <!-- 中间：再加 10m (点击执行 extendTimer()) -->
            <button onclick="extendTimer()" class="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-white/60 rounded-2xl py-4 min-h-[140px] active:scale-95 transition-transform bg-transparent">
                <span class="text-lg font-black text-white">再加</span>
                <span class="text-lg font-black text-white">10m</span>
            </button>

            <!-- 右侧：目标达成 (点击执行 stopTimer(true)) -->
            <button onclick="stopTimer(true)" class="flex-1 flex flex-col items-center justify-center bg-white rounded-2xl py-4 min-h-[140px] active:scale-95 transition-transform">
                <span style="writing-mode: vertical-rl; letter-spacing: 4px;" class="font-black text-black mb-1">目标达成</span>
                <span class="text-xl">✅</span>
            </button>

        </div>
    </div>

    <!-- 面板与逻辑 (设置、日志、任务处理) -->
    <div id="settingPanel" class="side-panel">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-black text-xl text-slate-800">系统偏好</h3>
            <button onclick="closePanels()" class="text-slate-400 text-2xl">✕</button>
        </div>
        <div id="settingList" class="scroll-area space-y-6"></div>
    </div>

    <div id="logPanel" class="side-panel">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-black text-xl text-slate-800">运行日志</h3>
            <button onclick="closePanels()" class="text-slate-400 text-2xl">✕</button>
        </div>
        <div class="scroll-area">
            <div class="mb-4 flex gap-2">
                <button onclick="copyLogs()" class="flex-1 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold">复制全部</button>
                <button onclick="clearLogs()" class="py-2 px-4 bg-red-50 text-red-500 rounded-xl text-xs font-bold">清空</button>
            </div>
            <pre id="logContent" class="text-[10px] font-mono text-slate-500 leading-relaxed whitespace-pre-wrap"></pre>
        </div>
    </div>

    <script>
        let currentMode = 'focus';
        let tasks = JSON.parse(localStorage.getItem('os_tasks_v12')) || [];
        let logs = JSON.parse(localStorage.getItem('os_logs_v12')) || [];
        let timer = null;
        let timeLeft = 0;
        let activeTaskId = null;

        let settings = JSON.parse(localStorage.getItem('os_settings_v12')) || {
            focus: { bg: '#1e40af', text: '#ffffff', note: '正在深度专注 · 请勿打扰', defaultTime: 45 },
            sturdy: { bg: '#065f46', text: '#ffffff', note: '正在强健体格 · 稍后联系', defaultTime: 40 },
            buffer: { bg: '#6b21a8', text: '#ffffff', note: '能量恢复中 · 谢绝访客', defaultTime: 15 },
            admin: { bg: '#334155', text: '#ffffff', note: '正在清理杂项 · 欢迎插单', defaultTime: 10 }
        };

        const modeMeta = {
            focus: { title: 'Focus', desc: '深度工作管理' },
            sturdy: { title: 'Sturdy', desc: '体能序列管理' },
            buffer: { title: 'Buffer', desc: '能量恢复管理' },
            admin: { title: 'Admin', desc: '琐碎事务管理' }
        };

        function addLog(action, taskName, extra = "") {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            const logEntry = `[${timeStr}] [${currentMode.toUpperCase()}] ${action.padEnd(8)} | ${taskName} ${extra ? '(' + extra + ')' : ''}`;
            logs.unshift(logEntry);
            if (logs.length > 500) logs.pop();
            localStorage.setItem('os_logs_v12', JSON.stringify(logs));
        }

        function switchMode(mode) {
            currentMode = mode;
            const theme = settings[mode];
            document.getElementById('mainHeader').style.backgroundColor = theme.bg;
            document.getElementById('addBtn').style.backgroundColor = theme.bg;
            document.getElementById('addBtn').style.color = theme.text;
            document.getElementById('modeTitle').innerText = modeMeta[mode].title;
            document.getElementById('modeDesc').innerText = theme.defaultTime + "分钟 " + modeMeta[mode].desc;
            document.getElementById('timeDurationInp').value = theme.defaultTime;

            document.querySelectorAll('button[id^="tab-"]').forEach(b => {
                b.className = "flex-1 py-2 rounded-xl text-[10px] font-black transition-all opacity-30 text-white bg-transparent";
            });
            document.getElementById(`tab-${mode}`).className = "flex-1 py-2 rounded-xl text-[10px] font-black shadow-inner opacity-100 bg-white/20 text-white";

            renderInputs();
            renderTasks();
        }

        function renderInputs() {
            const container = document.getElementById('modeSpecificInput');
            if (currentMode === 'focus') {
                container.innerHTML = `
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1 ml-1">优先级</label>
                    <select id="prioInp" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-slate-700 border-2 border-transparent focus:border-slate-200">
                        <option value="1">🔴 P1 重要且紧急</option><option value="2" selected>🟠 P2 重要不紧急</option><option value="3">🔵 P3 紧急不重要</option><option value="4">⚪ P4 杂项琐事</option></select>`;
            } else if (currentMode === 'buffer') {
                container.innerHTML = `
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1 ml-1">能耗</label>
                    <div class="flex gap-3"><label class="flex-1"><input type="radio" name="eng" value="low" checked class="hidden peer"><div class="peer-checked:bg-purple-600 peer-checked:text-white border-2 border-slate-100 p-3 rounded-2xl text-center cursor-pointer font-black transition-all">🪫 低</div></label>
                    <label class="flex-1"><input type="radio" name="eng" value="mid" class="hidden peer"><div class="peer-checked:bg-purple-600 peer-checked:text-white border-2 border-slate-100 p-3 rounded-2xl text-center cursor-pointer font-black transition-all">🔋 中</div></label>
                    <label class="flex-1"><input type="radio" name="eng" value="high" class="hidden peer"><div class="peer-checked:bg-purple-600 peer-checked:text-white border-2 border-slate-100 p-3 rounded-2xl text-center cursor-pointer font-black transition-all">⚡ 深度</div></label></div>`;
            } else container.innerHTML = '';
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            let filtered = tasks.filter(t => t.mode === currentMode && !t.completed);
            if (currentMode === 'focus') filtered.sort((a,b) => a.prio - b.prio);

 filtered.forEach((task, index) => {
    // 1. 创建最外层容器
    const container = document.createElement('div');
    container.className = `swipe-container task-card shadow-sm`;
    container.style.animationDelay = `${index * 0.05}s`;

    // 2. 注入三明治结构（底层 + 表层）
    container.innerHTML = `
        <!-- 底层：背景动作 (✅ 和 🗑️) -->
        <div id="underlay-${task.id}" class="swipe-underlay">
            <span class="text-2xl opacity-0 transition-opacity">✅</span>
            <span class="text-2xl opacity-0 transition-opacity">🗑️</span>
        </div>

        <!-- 表层：任务实际内容 -->
        <div id="content-${task.id}" class="swipe-content p-5 flex items-center justify-between ${currentMode === 'focus' ? 'prio-'+task.prio : ''}">
            <div class="flex-1">
                <p class="font-black text-slate-800 text-lg leading-tight">${task.text}</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">
                   ${currentMode === 'focus' ? 'P' + task.prio : (task.energy || '')} • ${task.duration}m
                </p>
            </div>
            <!-- 播放按钮保留，删除按钮可以去掉了，因为有了手势 -->
            <button onclick="startTimer(${task.id})" class="play-btn-ready w-14 h-14 flex items-center justify-center rounded-[20px]">
                <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M7 6v12l10-6z"></path></svg>
            </button>
        </div>
    `;

    // 3. 这里的关键：绑定手势逻辑（核心 JS）
    const content = container.querySelector('.swipe-content');
    const underlay = container.querySelector('.swipe-underlay');
    bindSwipeEvents(content, underlay, task.id);

    list.appendChild(container);
});
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const timeInput = document.getElementById('timeDurationInp');
            if (!input.value) return;
            const newTask = {
                id: Date.now(), mode: currentMode, text: input.value, completed: false,
                duration: parseInt(timeInput.value) || settings[currentMode].defaultTime,
                prio: document.getElementById('prioInp')?.value || 4,
                energy: document.querySelector('input[name="eng"]:checked')?.value || 'low'
            };
            tasks.push(newTask);
            addLog("添加", newTask.text, `${newTask.duration}m`);
            input.value = '';
            save(); switchMode(currentMode);
        }

        function deleteTask(id) {
            const task = tasks.find(t => t.id === id);
            addLog("删除", task.text);
            tasks = tasks.filter(t => t.id !== id);
            save(); switchMode(currentMode);
        }

        function completeQuick(id) {
            const task = tasks.find(t => t.id === id);
            addLog("完成", task.text);
            tasks = tasks.map(t => t.id === id ? {...t, completed: true} : t);
            setTimeout(() => { save(); renderTasks(); }, 300);
        }

        function startTimer(id) {
            activeTaskId = id;
            const task = tasks.find(t => t.id === id);
            timeLeft = task.duration * 60;
            addLog("开始", task.text, `${task.duration}m`);
            const theme = settings[currentMode];
            const board = document.getElementById('statusBoard');
            board.style.backgroundColor = theme.bg; board.style.color = theme.text;
            document.getElementById('boardNote').innerText = theme.note;
            document.getElementById('boardTaskName').innerText = "正在进行：" + task.text;
            board.classList.add('active');
            updateBoard();
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateBoard();
                } else {
                    // 时间到，不自动停止，将文字变红或闪烁提示
                    document.getElementById('boardTimer').classList.add('text-red-500', 'animate-pulse');
                    document.getElementById('boardNote').innerText = "⚠️ 时间已到，建议立即收尾或手动加时";
                }
            }, 1000);
        }
        function extendTimer() {
            const extMin = 10; // 默认加时10分钟
            timeLeft += extMin * 60;

            // 恢复UI状态
            document.getElementById('boardTimer').classList.remove('text-red-500', 'animate-pulse');
            const theme = settings[currentMode];
            document.getElementById('boardNote').innerText = theme.note;

            const task = tasks.find(t => t.id === activeTaskId);
            addLog("加时", task.text, `+${extMin}m`);
            updateBoard();
        }

        function updateBoard() {
            const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
            document.getElementById('boardTimer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function stopTimer(isDone) {
            // 新增：清除可能存在的告警样式
            document.getElementById('boardTimer').classList.remove('text-red-500', 'animate-pulse');

            const task = tasks.find(t => t.id === activeTaskId);
            clearInterval(timer);
            if (isDone) {
                addLog("标记完成", task.text);
                tasks = tasks.map(t => t.id === activeTaskId ? {...t, completed: true} : t);
            } else {
                addLog("挂起", task.text, `剩${Math.floor(timeLeft/60)}m`);
            }
            document.getElementById('statusBoard').classList.remove('active');
            activeTaskId = null;
            save(); renderTasks();
        }

        function toggleLogs(e) { e.stopPropagation(); closePanels(); document.getElementById('logPanel').classList.add('show'); renderLogs(); }
        function toggleSettings(e) { e.stopPropagation(); closePanels(); document.getElementById('settingPanel').classList.add('show'); renderSettings(); }
        function closePanels() { document.getElementById('settingPanel').classList.remove('show'); document.getElementById('logPanel').classList.remove('show'); }
        function renderLogs() { document.getElementById('logContent').innerText = logs.join('\n') || "空"; }
        function copyLogs() { navigator.clipboard.writeText(logs.join('\n')).then(() => alert("已复制")); }
        function clearLogs() { if(confirm("清空？")) { logs = []; save(); renderLogs(); } }

        function renderSettings() {
            const container = document.getElementById('settingList');
            container.innerHTML = '';
            for (let key in settings) {
                const div = document.createElement('div');
                div.className = "p-5 bg-slate-100 rounded-3xl space-y-4 border-2 border-slate-200";
                div.innerHTML = `<h4 class="font-black text-xs text-slate-400 uppercase tracking-widest">${modeMeta[key].title}</h4>
                    <div class="flex gap-2">
                        <div class="flex-1"><label class="text-[9px] block font-black mb-1 opacity-50 uppercase">默认分钟</label>
                        <input type="number" value="${settings[key].defaultTime}" oninput="updateSet('${key}','defaultTime',this.value)" class="w-full p-3 rounded-xl border-none text-sm font-black shadow-sm"></div>
                        <div class="flex-[2]"><label class="text-[9px] block font-black mb-1 opacity-50 uppercase">背景色</label>
                        <input type="color" value="${settings[key].bg}" oninput="updateSet('${key}','bg',this.value)" class="w-full h-10 rounded-xl cursor-pointer"></div>
                    </div>
                    <div><label class="text-[9px] block font-black mb-1 opacity-50 uppercase">全屏留言</label>
                    <input type="text" value="${settings[key].note}" oninput="updateSet('${key}','note',this.value)" class="w-full p-3 rounded-xl border-none text-sm font-black shadow-sm"></div>`;
                container.appendChild(div);
            }
        }

        function updateSet(l, f, v) {
            settings[l][f] = (f === 'defaultTime') ? parseInt(v) : v;
            localStorage.setItem('os_settings_v12', JSON.stringify(settings));
            if (l === currentMode) switchMode(currentMode);
        }

        function save() {
            localStorage.setItem('os_tasks_v12', JSON.stringify(tasks));
            localStorage.setItem('os_logs_v12', JSON.stringify(logs));
        }
        window.onclick = () => closePanels();

 // --- 滑动切换逻辑开始 ---
        let touchStartX = 0;
        let touchStartY = 0;
        let isTouchingTask = false; // 新增：标记是否触碰到任务卡片

        window.addEventListener('touchstart', function(e) {
            // 判断手指落点是否在任务卡片（swipe-content）上
            isTouchingTask = !!e.target.closest('.swipe-content');

            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        window.addEventListener('touchend', function(e) {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;

            // 如果落点在任务卡片上，或者全屏状态牌已激活，则不触发模式切换
            if (isTouchingTask || document.getElementById('statusBoard').classList.contains('active')) {
                return;
            }

            handleGesture(touchStartX, touchEndX, touchStartY, touchEndY);
        }, { passive: true });

        function handleGesture(startX, endX, startY, endY) {
            const deltaX = endX - startX;
            const deltaY = endY - startY;

            // 设定滑动阈值，并确保水平位移明显大于垂直位移
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 80) {
                const modes = ['focus', 'sturdy', 'buffer', 'admin'];
                let currentIndex = modes.indexOf(currentMode);

                if (deltaX < 0) {
                    // 向左滑动 -> 切换到下一个模式
                    let nextIndex = (currentIndex + 1) % modes.length;
                    switchMode(modes[nextIndex]);
                } else {
                    // 向右滑动 -> 切换到上一个模式
                    let prevIndex = (currentIndex - 1 + modes.length) % modes.length;
                    switchMode(modes[prevIndex]);
                }
            }
        }
        // --- 滑动切换逻辑结束 ---
        switchMode('focus');

        function bindSwipeEvents(el, underlay, taskId) {
    let startX = 0;
    let currentX = 0;

    el.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        el.classList.add('no-transition'); // 关掉动画，跟随手指
    }, {passive: true});

    el.addEventListener('touchmove', (e) => {
        currentX = e.touches[0].clientX - startX;

        // 限制滑动：不要滑出屏幕太远（阻尼感）
        if (Math.abs(currentX) > 200) currentX = currentX > 0 ? 200 + (currentX-200)*0.2 : -200 + (currentX+200)*0.2;

        el.style.transform = `translateX(${currentX}px)`;

        // 动态改变底层颜色和图标可见度
        const icons = underlay.querySelectorAll('span');
        if (currentX > 50) { // 右滑：完成
            underlay.style.backgroundColor = '#22c55e'; // 绿色
            icons[0].style.opacity = '1'; icons[1].style.opacity = '0';
        } else if (currentX < -50) { // 左滑：删除
            underlay.style.backgroundColor = '#ef4444'; // 红色
            icons[0].style.opacity = '0'; icons[1].style.opacity = '1';
        } else {
            underlay.style.backgroundColor = 'transparent';
        }
    }, {passive: true});

    el.addEventListener('touchend', () => {
        el.classList.remove('no-transition'); // 开启平滑回弹动画

        if (currentX > 130) {
            // 成功：向右完全滑出并完成
            el.style.transform = 'translateX(100%)';
            setTimeout(() => completeQuick(taskId), 200);
        } else if (currentX < -130) {
            // 成功：向左完全滑出并删除
            el.style.transform = 'translateX(-100%)';
            setTimeout(() => deleteTask(taskId), 200);
        } else {
            // 失败：弹回原位
            el.style.transform = 'translateX(0)';
            underlay.style.backgroundColor = 'transparent';
        }
        currentX = 0;
    });
}
